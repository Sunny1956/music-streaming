<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Stream - Login & Sign-up</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#121212;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.auth-container{
background:#1E1E1E;
padding:40px;
border-radius:15px;
width:100%;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
text-align:center;
border:1px solid #333;
}

h2{
margin-bottom:20px;
font-size:28px;
color:#EE10B0;
}

.input-group{
margin-bottom:15px;
text-align:left;
}

.input-group label{
display:block;
font-size:12px;
color:#aaa;
margin-bottom:5px;
}

.input-group input{
width:100%;
padding:12px;
background:#2A2A2A;
border:1px solid #333;
border-radius:8px;
color:white;
outline:none;
}

.input-group input:focus{
border-color:#EE10B0;
}

.btn-main{
width:100%;
padding:12px;
background:#EE10B0;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
margin-top:10px;
font-size:16px;
}

.btn-main:hover{
background:#d00e99;
}

.switch-text{
margin-top:20px;
font-size:14px;
color:#888;
}

.switch-text a{
color:#0E9EEF;
cursor:pointer;
}

.hidden{
display:none;
}

</style>
</head>

<body>

<div class="auth-container">
<div id="auth-msg" style="margin-bottom: 15px; font-size: 14px; font-weight: bold; min-height: 20px;"></div>

<!-- LOGIN -->
<div id="login-form">

<h2>Login</h2>

<div class="input-group">
<label>Email</label>
<input type="email" id="login-email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="login-password">
</div>

<button class="btn-main" onclick="loginUser()">Login</button>

<p class="switch-text">
Don't have an account?
<a onclick="showRegister()">Sign Up</a>
</p>

</div>

<!-- REGISTER -->
<div id="register-form" class="hidden">

<h2>Register</h2>

<div class="input-group">
<label>Username</label>
<input type="text" id="reg-name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="reg-email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="reg-password">
</div>

<button class="btn-main" onclick="registerUser()">Sign Up</button>

<p class="switch-text">
Already have an account?
<a onclick="showLogin()">Login</a>
</p>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
